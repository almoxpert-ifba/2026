server {
  listen 8000;
  listen [::]:8000;

  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Fallback de SPA: qualquer rota do cliente (ex.: /dashboard) que não
  # corresponda a um arquivo estático cai no index.html, deixando o roteador
  # do React resolver. Sem isso, o acesso direto/refresh em rotas internas
  # retorna 404 (comportamento do Nginx padrão).
  location / {
    try_files $uri $uri/ /index.html;
  }

  location /health {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
  }
}
